<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .gallery {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <div class="gallery">
        <img src="https://th.bing.com/th/id/OIP.xKiE_jUn8tPueoLWXsyCPgHaEo?w=302&h=188&c=7&r=0&o=7&pid=1.7&rm=3" alt="Image 1">
        <img src="https://th.bing.com/th/id/OIP.6lL4MboZ6-ZtULpHuGykaAHaE7?w=275&h=183&c=7&r=0&o=7&pid=1.7&rm=3" alt="Image 2">
        <img src="https://th.bing.com/th/id/OIP.I4X_ilJ5O8dMg1yrVXovmQHaEo?w=303&h=188&c=7&r=0&o=7&pid=1.7&rm=3" alt="Image 3">
    </div>
</body>
</html>
