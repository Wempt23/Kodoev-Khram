<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0a0a0a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .u-shape-container {
            width: 320px;
            height: 380px;
            border: 3px solid #333;
            border-top: 3px solid #333;
            border-radius: 0 0 160px 160px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .side-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .btn {
            width: 50px;
            height: 50px;
            border: 2px solid #444;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            color: #00ffcc;
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            text-shadow: 0 0 5px #00ffcc;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .center-btn {
            width: 60px;
            height: 160px;
            border: 2px solid #ff3366;
            background: transparent;
            color: #ff3366;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 5px rgba(255, 51, 102, 0.2);
        }

        .center-btn:hover {
            background: #ff3366;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.6);
        }

        .center-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.8);
        }

        .center-btn span {
            display: block;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { border-color: #333; }
            50% { border-color: #555; }
            100% { border-color: #333; }
        }

        .u-shape-container {
            animation: pulse 4s infinite;
        }
    </style>
</head>
<body>

    <div class="u-shape-container">
        <div class="side-buttons">
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
        </div>

        <button class="center-btn" onclick="window.close()">
            <span>O</span>
            <span>F</span>
            <span>F</span>
        </button>

        <div class="side-buttons">
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
        </div>
    </div>

</body>
</html>
