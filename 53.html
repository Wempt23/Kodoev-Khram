<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        :root {
            --bg-dark: #0f1016;
            --terminal-green: #50fa7b;
            --text-dim: #6272a4;
            --accent-red: #ff5555;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .console-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border: 2px solid var(--text-dim);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6);
            width: 380px;
        }

        .spinner {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--accent-red);
            text-shadow: 0 0 8px var(--accent-red);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #282a36;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--terminal-green);
            box-shadow: 0 0 8px var(--terminal-green);
            animation: load-progress 8s linear infinite;
        }

        @keyframes load-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        #status-text {
            font-size: 1rem;
            text-align: center;
            min-height: 2.4em;
            line-height: 1.2;
            word-break: break-word;
        }

        .caret::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1 }
            50% { opacity: 0 }
        }
    </style>
</head>
<body>

    <div class="console-box">
        <div class="spinner">[ >_ ]</div>
        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
        <div id="status-container">
            <span id="status-text">Запуск инициализации</span><span class="caret"></span>
        </div>
    </div>

    <script>
        const phrases = [
            "Разгоняем Pentium до скорости света",
            "Вычисляем долю Янчика в госдолге",
            "Кормим фиксиков в системнике",
            "Пытаемся не уронить Windows",
            "Компилируем Кодоев Храм",
            "Ищем смысл жизни в тегах <div>",
            "Очищаем кэш от плохих воспоминаний",
            "Взламываем Пентагон",
            "Почти готово... (на самом деле нет)",
            "Компилируем шейдеры, жди час"
        ];

        const textElement = document.getElementById('status-text');
        let index = 0;

        function changeText() {
            index = (index + 1) % phrases.length;
            textElement.innerText = phrases[index];
            setTimeout(changeText, 2500 + Math.random() * 2000);
        }

        setTimeout(changeText, 2500);
    </script>
</body>
</html>
