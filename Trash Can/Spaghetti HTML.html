<!DOCTYPE html>
<html>
<head>
    <title>Spaghetti HTML</title>
</head>
<body>
    <div>
        <p>
            <span>
                <strong>
                    <em>
                        <u>
                            Messy, nested content
                        </u>
                    </em>
                </strong>
            </span>
        </p>
        <table>
            <tr>
                <td>
                    <div>
                        <p>
                            Data in divs in tables in divs
                        </p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
    <section>
        <article>
            <header>
                <nav>
                    <ul>
                        <li><a href="#">Link 1</a></li>
                        <li><a href="#">Link 2</a></li>
                    </ul>
                </nav>
            </header>
        </article>
    </section>
</body>
</html>
