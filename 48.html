<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        .main-card {
            width: 220px;
            padding: 40px 20px;
            background-color: #262626;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .round-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.3s;
            padding: 5px;
        }

        .round-btn:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        #message {
            margin-top: 15px;
            color: #00d1b2;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <button class="round-btn" id="message" onclick="showText('First Button')">1</button>
        <button class="round-btn" id="message" onclick="showText('Second Button')">2</button>
        <button class="round-btn" id="message" onclick="showText('Third Button')">3</button>
        <button class="round-btn" id="message" onclick="showText('Fourth Button')">4</button>
        
    </div>

    <script>
        function showText(msg) {
            document.getElementById('message').innerText = msg;
        }
    </script>

</body>
</html>
