<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Terms</title>
</head>
<body style="background-color: aquamarine; text-align: center;">
    <h2 style="color: mediumblue;">IT Terms</h2>
    <dl>
        <dt>Algorithm</dt>
        <dd>Step-by-step procedure for solving a problem</dd>
        
        <dt>Cache</dt>
        <dd>Fast memory storage for frequently accessed data</dd>
        
        <dt>Firewall</dt>
        <dd>Security system that monitors network traffic</dd>
        
        <dt>Latency</dt>
        <dd>Delay in data transmission over a network</dd>
        
        <dt>Repository</dt>
        <dd>Storage location for project files and version control</dd>
    </dl>
</body>
</html>
