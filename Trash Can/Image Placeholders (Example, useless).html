<!doctype html>
<html lang="en">
<head>
    <title>Image examples</title>
</head>
<body>
    <h1>Image examples</h1>

    <div class="grid">
        <!-- Simple image with alt text and lazy loading -->
        <figure>
            <img src="https://via.placeholder.com/800x450.png?text=Simple+Image" alt="Simple placeholder" width="800" height="450" loading="lazy">
            <figcaption>Simple img with alt, explicit dimensions and loading="lazy".</figcaption>
        </figure>

        <!-- Responsive image using srcset and sizes -->
        <figure>
            <img
                src="https://via.placeholder.com/1200x675.png?text=Responsive+Fallback"
                srcset="
                    https://via.placeholder.com/400x225.png?text=400w 400w,
                    https://via.placeholder.com/800x450.png?text=800w 800w,
                    https://via.placeholder.com/1200x675.png?text=1200w 1200w
                "
                sizes="(max-width:600px) 100vw, (max-width:1200px) 50vw, 400px"
                alt="Responsive placeholder"
                loading="lazy"
                width="1200"
                height="675">
            <figcaption>Responsive srcset + sizes to serve appropriate resolution.</figcaption>
        </figure>

        <!-- Picture element for art-direction or format fallbacks (WebP preferred) -->
        <figure>
            <picture>
                <!-- Browser that supports WebP will pick this (if server provides .webp) -->
                <source type="image/webp" srcset="
                    https://via.placeholder.com/800x450.webp?text=WebP+800w 800w,
                    https://via.placeholder.com/400x225.webp?text=WebP+400w 400w
                " sizes="(max-width:600px) 100vw, 800px">
                <!-- Fallback to PNG/JPEG -->
                <img src="https://via.placeholder.com/800x450.png?text=Fallback+PNG" alt="Picture element example" loading="lazy" width="800" height="450">
            </picture>
            <figcaption>Using picture for format fallback or different crops/art-direction.</figcaption>
        </figure>

        <!-- Local image example (place an image file next to this HTML) -->
        <figure>
            <img src="./image.jpg" alt="Local image example (place image.jpg next to this HTML file)" loading="lazy">
            <figcaption>Local file reference: ./image.jpg — add a file with that name in the same folder.</figcaption>
        </figure>
    </div>
</body>
</html>
